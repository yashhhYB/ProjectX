# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini 3.1 Pro (High)"
  - "Antigravity IDE"
  - "Claude (architecture review)"

ai_usage_summary: |
  Used Antigravity IDE with Gemini and Claude for collaborative refactoring of the
  9-component composite scoring engine, career depth analyzer, and fact-based reasoning
  generator. AI tools assisted with code structure and review; all ranking logic and
  design decisions are original engineering work.

# ============================================================================
# Approach summary (v2)
# ============================================================================
methodology_summary: |
  v2 pipeline reads the JD deeply — understanding not just what it says but what it means.
  
  Technical Strategy:
  1. 9-Component Composite Scorer: Title/Career (25%), Skills (18%), Semantic (12%),
     Experience Gaussian (10%), Behavioral signals (10%), Career Depth (8%),
     Skill Assessments (7%), Location (5%), Education (5%).
  2. All 23 Redrob Behavioral Signals: Response rate, recency, notice period, GitHub,
     profile completeness, verification, recruiter saves — weighted by importance.
  3. Career Depth Analysis: Product vs consulting ratio, production keyword density,
     career trajectory scoring, job-hopper detection (avg tenure < 18 months).
  4. Enhanced Honeypot Detection: 9 consistency checks including education timeline
     impossibility, excessive expert claims, and mass zero-duration experts.
  5. Unique Fact-Based Reasoning: Each candidate gets substantively different reasoning
     referencing specific skills, career highlights, assessment scores, and honest concerns.
  6. Upgraded Embeddings: all-mpnet-base-v2 (768-dim) with enriched candidate text
     (skills, certifications, education) and enriched JD query.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
